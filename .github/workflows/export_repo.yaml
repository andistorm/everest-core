name: Export Repository Workflow
on:
  workflow_call:
    inputs:
      # General inputs
      runner:
        description: 'Which runner to use'
        required: false
        default: 'ubuntu-24.04'
        type: string
      source-subdirectory:
        description: 'The subdirectory in the source repository to export'
        required: true
        type: string
      target-repo-url:
        description: 'The target repository URL to push the exported subdirectory to'
        required: true
        type: string
      target-repo-branch:
        description: 'The target branch in the target repository'
        required: true
        type: string
      replace-placeholder:
        description: 'Placeholder string to replace in the exported files'
        required: false
        default: '@@GIT_TAG_EVEREST_CORE@@'
        type: string
      replace-placeholder-file:
        description: 'File path (relative to target repo root) in which to replace the placeholder'
        required: true
        type: string
    secrets:
      SA_GITHUB_SSH_KEY:
        description: 'SSH key for accessing the target repository'
        required: true

jobs:
  export-repo:
    name: Export Subdirectory to Another Repository
    runs-on: ${{ inputs.runner }}
    env:
      SSH_AUTH_SOCK: /tmp/ssh-agent.sock
    steps:
      - name: Setup SSH Agent, optional with SSH key
        env:
          SSH_KEY: ${{ secrets.SA_GITHUB_SSH_KEY }}
        run: |
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          if [ -z "${{ env.SSH_KEY }}" ]; then
            echo "No SSH key provided, skipping SSH key setup"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Check if github.com is already in known_hosts, if not, add it
          if ! grep -q "^github.com " ~/.ssh/known_hosts; then
            ssh-keyscan github.com >> ~/.ssh/known_hosts
          fi
          ssh-add ~/.ssh/id_ed25519
      - name: Configure Git
        run: |
          git config --global user.name "Pionix Github Service Account"
          git config --global user.email "compiler@pionix.de"
      - name: Checkout Source Repository
        uses: actions/checkout@v6
        with:
          path: source
          fetch-depth: 2
      - name: Export Subdirectory
        run: | 
          ${{ github.workspace }}/source/applications/scripts/export-repo.py \
            --origin-repo-root-dir ${{ github.workspace }}/source \
            --source-subdirectory ${{ inputs.source-subdirectory }} \
            --target-repo-url ${{ inputs.target-repo-url }} \
            --target-repo-branch ${{ inputs.target-repo-branch }} \
            --target-repo-root-dir ${{ github.workspace }}/target-repo \
            --replace-placeholder ${{ inputs.replace-placeholder }} \
            --replace-placeholder-file ${{ inputs.replace-placeholder-file }} \

